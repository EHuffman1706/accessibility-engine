<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" role="img" aria-labelledby="title desc">

<title id="title">Accessibility Engine Concept Architecture</title>
<desc id="desc">
This diagram shows the conceptual architecture of Accessibility Engine. 
The flow is: User → Assistive Technology → Accessibility Engine → Agentic AI Mediation → Digital and Physical Systems.
</desc>

<style>
.box { fill:#f4f6f8; stroke:#333; stroke-width:2; }
.text { font-family: Arial, sans-serif; font-size:16px; text-anchor:middle; }
.arrow { stroke:#333; stroke-width:2; marker-end:url(#arrow); }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
<path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
</marker>
</defs>

<rect x="350" y="50" width="200" height="60" class="box"/>
<text x="450" y="85" class="text">User</text>

<rect x="350" y="150" width="200" height="60" class="box"/>
<text x="450" y="185" class="text">Assistive Technology</text>

<rect x="350" y="250" width="200" height="60" class="box"/>
<text x="450" y="285" class="text">Accessibility Engine</text>

<rect x="350" y="350" width="200" height="60" class="box"/>
<text x="450" y="385" class="text">Agentic AI Mediation</text>

<rect x="350" y="450" width="200" height="60" class="box"/>
<text x="450" y="485" class="text">Digital & Physical Systems</text>

<line x1="450" y1="110" x2="450" y2="150" class="arrow"/>
<line x1="450" y1="210" x2="450" y2="250" class="arrow"/>
<line x1="450" y1="310" x2="450" y2="350" class="arrow"/>
<line x1="450" y1="410" x2="450" y2="450" class="arrow"/>

</svg>
